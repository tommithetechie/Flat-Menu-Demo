<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 8 Phone Style</title>
    <link href="style.css" rel="stylesheet" />
    <link href='https://fonts.googleapis.com/css?family=Segoe+UI:300,400,600' rel='stylesheet' type='text/css'>
</head>

<body>

    <div id="phone-screen">
        <header class="status-bar">
            <div class="time">10:00</div>
            <div class="icons">
                <span class="signal">illll</span>
                <span class="battery">100% []</span>
            </div>
        </header>

        <div class="start-screen">
            <h1 class="page-title">start</h1>

            <div class="tile-grid">
                <a href="#" class="tile medium bg-blue">
                    <div class="tile-icon">📞</div>
                    <span class="tile-label">Phone</span>
                </a>
                <a href="#" class="tile medium bg-green">
                    <div class="tile-icon">💬</div>
                    <span class="tile-label">Messaging</span>
                </a>

                <a href="#" class="tile wide bg-red">
                    <div class="tile-content">
                        <h2>Outlook</h2>
                        <p>Meeting at 2 PM</p>
                        <p>Check the new design docs for the product launch.</p>
                    </div>
                    <span class="tile-label">Mail</span>
                </a>

                <a href="#" class="tile medium bg-purple">
                    <div class="tile-icon">📷</div>
                    <span class="tile-label">Photos</span>
                </a>
                <a href="#" class="tile medium bg-orange">
                    <div class="tile-icon">⚙️</div>
                    <span class="tile-label">Settings</span>
                </a>

                <a href="#" class="tile wide bg-teal">
                    <div class="tile-content calendar-tile">
                        <h2 class="calendar-day">14</h2>
                        <p class="calendar-date">Tuesday</p>
                    </div>
                    <span class="tile-label">Calendar</span>
                </a>

                <a href="#" class="tile small bg-cyan">
                    <div class="tile-icon">IE</div>
                </a>
                <a href="#" class="tile small bg-pink">
                    <div class="tile-icon">🎮</div>
                </a>
                <a href="#" class="tile small bg-yellow">
                    <div class="tile-icon">🎵</div>
                </a>
                <a href="#" class="tile small bg-blue">
                    <div class="tile-icon">☁️</div>
                </a>

                <a href="#" class="tile wide bg-green">
                    <div class="tile-content">
                        <h2>Xbox Live</h2>
                        <p>3 Friends Online</p>
                    </div>
                    <span class="tile-label">Games</span>
                </a>

                <a href="#" class="tile medium bg-darkblue">
                    <div class="tile-icon">👤</div>
                    <span class="tile-label">People</span>
                </a>

                <a href="#" class="tile medium bg-magenta">
                    <div class="tile-icon">📻</div>
                    <span class="tile-label">Podcasts</span>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
